! ============================================
! A-ASBR1  (AS 65001)  SR Node SID: 16010
! Loopback: 10.0.1.254/32
! eBGP peer: B-ASBR1 (10.100.12.2) AS 65002
! ============================================
frr version 10.5
frr defaults traditional
hostname a-asbr1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface lo
 ip address 10.0.1.254/32
 ip router isis CORE
 isis passive
!
interface a_asbr1-eth0
 description link-to-a_r1
 ip address 10.1.1.10/30
 ip router isis CORE
 isis network point-to-point
 isis hello-interval 3
 isis metric 10
 mpls enable
!
interface a_asbr1-eth1
 description eBGP-to-b_asbr1
 ip address 10.100.12.1/30
 mpls enable
!

route-map ALLOW-ALL permit 10
!

router isis CORE
 net 49.0001.0100.0001.0254.00
 is-type level-2-only
 topology ipv4-unicast
 segment-routing on
 segment-routing global-block 16000 16999
 segment-routing node-msd 8
 segment-routing prefix 10.0.1.254/32 index 10
 redistribute ipv4 bgp level-2 route-map ALLOW-ALL
!

router bgp 65001
 bgp router-id 10.0.1.254
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.100.12.2 remote-as 65002
 neighbor 10.100.12.2 description eBGP-to-B-ASBR1
 neighbor 10.100.12.2 ebgp-multihop 2
 neighbor 10.100.12.2 timers 10 30
 !
 address-family ipv4 unicast
  neighbor 10.100.12.2 activate
  neighbor 10.100.12.2 soft-reconfiguration inbound
  neighbor 10.100.12.2 route-map ALLOW-ALL in
  neighbor 10.100.12.2 route-map ALLOW-ALL out
  redistribute isis route-map ALLOW-ALL
  redistribute connected route-map ALLOW-ALL
  network 10.0.1.0/24
 exit-address-family
 !
 address-family link-state
  neighbor 10.100.12.2 activate
 exit-address-family
!
