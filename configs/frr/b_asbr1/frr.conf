! ============================================
! B-ASBR1  (AS 65002)  SR Node SID: 17010
! Loopback: 10.0.2.251/32
! eBGP peer: A-ASBR1 (10.100.12.1) AS 65001
! ============================================
frr version 10.5
frr defaults traditional
hostname b-asbr1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface lo
 ip address 10.0.2.251/32
 ip router isis CORE
 isis passive
!
interface b_asbr1-eth0
 description link-to-b_r1
 ip address 10.2.1.10/30
 ip router isis CORE
 isis network point-to-point
 isis hello-interval 3
 isis metric 10
 mpls enable
!
interface b_asbr1-eth1
 description eBGP-to-a_asbr1
 ip address 10.100.12.2/30
 mpls enable
!

router isis CORE
 net 49.0002.0100.0002.0251.00
 is-type level-2-only
 topology ipv4-unicast
 segment-routing on
 segment-routing global-block 17000 17999
 segment-routing node-msd 8
 segment-routing prefix 10.0.2.251/32 index 10
!

router bgp 65002
 bgp router-id 10.0.2.251
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.100.12.1 remote-as 65001
 neighbor 10.100.12.1 description eBGP-to-A-ASBR1
 neighbor 10.100.12.1 ebgp-multihop 2
 neighbor 10.100.12.1 timers 10 30
 !
 address-family ipv4 unicast
  neighbor 10.100.12.1 activate
  neighbor 10.100.12.1 soft-reconfiguration inbound
  redistribute isis
  redistribute connected
  network 10.0.2.0/24
 exit-address-family
 !
 address-family link-state
  neighbor 10.100.12.1 activate
 exit-address-family
!
